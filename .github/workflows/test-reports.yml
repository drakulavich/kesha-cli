name: Test Reports

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          ref: main

      - name: 📥 Download CI test artifacts
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          pattern: test-results-*
          path: allure-results
          github-token: ${{ github.token }}
          merge-multiple: true

      - name: 📋 List downloaded results
        run: find allure-results -type f

      - name: 📊 Generate Allure report
        run: bunx allure generate allure-results --output allure-report --report-name "Parakeet CLI Tests"

      - name: 📜 Load previous reports from gh-pages
        continue-on-error: true
        run: bash .github/scripts/load-allure-history.sh

      - name: 🚀 Publish report
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ github.token }}
          publish_branch: gh-pages
          publish_dir: deploy
          keep_files: true
